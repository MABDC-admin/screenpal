<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; frame-src https://www.youtube.com https://www.youtube-nocookie.com"
    />
    <title>Recording Annotations</title>
    <link rel="stylesheet" href="./annotation.css" />
  </head>
  <body>
    <canvas id="drawCanvas" aria-label="Recording annotation canvas"></canvas>
    <button id="collapsedTool" class="collapsed-tool" type="button" title="Show annotation tools">
      <img class="collapsed-logo" src="../annotation-app/assets/mabdc-logo-circle.png" alt="" />
      <span>Tools</span>
    </button>
    <div id="toolbar" class="toolbar" role="toolbar" aria-label="Recording annotation tools">
      <div class="annotation-brand" aria-label="M.A Brain Annotation Tools">
        <img src="../annotation-app/assets/mabdc-logo-circle.png" alt="" />
        <span>M.A Brain</span>
      </div>
      <button id="inputMode" class="mode-toggle active" type="button" title="Toggle drawing tools on or off">Annotate On</button>
      <button class="tool active" type="button" data-tool="pen" title="Pen">Pen</button>
      <button class="tool" type="button" data-tool="arrow" title="Arrow">Arrow</button>
      <button class="tool" type="button" data-tool="rect" title="Rectangle">Rect</button>
      <button class="tool" type="button" data-tool="ellipse" title="Circle or ellipse">Circle</button>
      <button class="tool" type="button" data-tool="spotlight" title="Pointer spotlight">Pointer</button>
      <button class="tool" type="button" data-tool="text" title="Text label">Text</button>
      <button class="tool" type="button" data-tool="move" title="Move existing objects">Move</button>
      <button id="emojiToggle" type="button" title="Open emoji tools">Emoji</button>
      <button id="supplementToggle" type="button" title="Show supplementary tools">More</button>
      <label class="color-field" title="Annotation color">
        <span>Color</span>
        <input id="color" type="color" value="#ff2d55" />
      </label>
      <label class="size-field" title="Stroke size">
        <span>Size</span>
        <input id="strokeSize" type="range" min="2" max="20" value="6" />
      </label>
      <button id="undo" type="button" title="Undo last object">Undo</button>
      <button id="deleteObject" type="button" title="Delete selected object">Delete Obj</button>
      <button id="clear" type="button" title="Clear all objects">Clear</button>
      <button id="stop" class="danger" type="button" title="Stop recording">Stop Rec</button>
      <button id="close" type="button" title="Hide annotation tools but keep the reopen button available">Hide Tools</button>
      <button id="toolbarClose" class="toolbar-close" type="button" title="Close annotation tools">X</button>
    </div>
    <div id="emojiPanel" class="emoji-panel hidden" aria-label="Emoji tools">
      <div class="emoji-panel-header">
        <strong>Emoji</strong>
        <input id="emojiSearch" type="search" placeholder="Search emoji" />
        <button id="emojiPanelClose" type="button">X</button>
      </div>
      <div id="emojiCategories" class="emoji-categories"></div>
      <div id="animatedEmojiRow" class="animated-emoji-row" aria-label="Animated emojis"></div>
      <div id="emojiGrid" class="emoji-grid"></div>
    </div>
    <div id="supplementPanel" class="supplement-panel hidden" aria-label="Supplementary annotation tools">
      <button class="supplement-tool" type="button" data-tool="blur" title="Cover sensitive information">Blur Info</button>
      <button class="supplement-tool" type="button" data-tool="formula" title="Insert math formula text">Formula</button>
      <button id="youtubeTool" type="button" title="Open YouTube playback tool">YouTube</button>
    </div>
    <div id="textEditor" class="text-editor hidden" role="dialog" aria-label="Insert annotation text">
      <label id="textEditorTitle" for="textEditorInput">Text</label>
      <input id="textEditorInput" type="text" autocomplete="off" spellcheck="false" />
      <button id="textEditorInsert" type="button">Insert</button>
      <button id="textEditorCancel" type="button">Cancel</button>
    </div>
    <div id="youtubePlayer" class="youtube-player hidden" aria-label="YouTube playback">
      <div id="youtubeHeader" class="youtube-header">
        <strong>YouTube</strong>
        <div class="youtube-actions">
          <button id="youtubeFullscreen" type="button">Full</button>
          <button id="youtubeClose" type="button">Close</button>
        </div>
      </div>
      <div class="youtube-controls">
        <input id="youtubeUrl" type="url" placeholder="Paste YouTube link" />
        <button id="youtubeLoad" type="button">Play</button>
      </div>
      <iframe
        id="youtubeFrame"
        title="YouTube player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
      <div id="youtubeResize" class="youtube-resize" title="Resize YouTube player"></div>
    </div>
    <script src="./annotation.js"></script>
  </body>
</html>
